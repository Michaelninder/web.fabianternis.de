<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Fabian Ternis — German Webdeveloper. View work, explore domain portfolio, and get in touch.">
  <meta name="theme-color" content="#131313">
  <title>Fabian Ternis</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Loader ───────────────────────────────────── -->
  <div id="loader" role="progressbar" aria-label="Loading" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
    <div class="loader-half loader-half--top"></div>
    <div class="loader-half loader-half--bottom"></div>
    <div class="loader-status">
      <span class="loader-count" id="loader-count" aria-live="off">00</span>
      <div class="loader-bar-wrap">
        <div class="loader-bar-fill" id="loader-bar-fill"></div>
      </div>
    </div>
  </div>

  <!-- ── Main ─────────────────────────────────────── -->
  <main id="main" aria-hidden="true">

    <!-- Registration marks (decorative) -->
    <div class="reg reg--tl" aria-hidden="true"></div>
    <div class="reg reg--tr" aria-hidden="true"></div>
    <div class="reg reg--bl" aria-hidden="true"></div>
    <div class="reg reg--br" aria-hidden="true"></div>

    <div class="stage">

      <!-- Heading -->
      <header class="site-header">
        <div class="name-wrap" aria-label="Fabian Ternis">
          <span class="name-line" id="nl-fabian" aria-hidden="true">Fabian</span>
          <span class="name-line" id="nl-ternis" aria-hidden="true">Ternis</span>
        </div>
        <p class="site-role" id="site-role">
          <span class="role-dash" aria-hidden="true">—</span>
          German Webdeveloper
          <span class="cursor-blink" aria-hidden="true"></span>
          <span class="role-dash" aria-hidden="true">—</span>
        </p>
      </header>

      <!-- CTA Buttons -->
      <nav class="cta-nav" id="cta-nav" aria-label="Links">

        <!-- Row 1 — live links -->
        <div class="btn-row" id="btn-row-1">

          <!-- 1 · View Work -->
          <a href="https://work.fabianternis.dev"
             class="btn btn--work"
             id="btn-work"
             target="_blank"
             rel="noopener noreferrer"
             aria-label="View my work (opens in new tab)">
            <span class="btn__flood" aria-hidden="true"></span>
            <span class="btn__inner">
              <span class="btn__text">View Work</span>
              <span class="btn__icon" aria-hidden="true">
                <svg width="15" height="15" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor"
                     stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                     aria-hidden="true" focusable="false">
                  <path d="M5 12h14"/>
                  <path d="m12 5 7 7-7 7"/>
                </svg>
              </span>
            </span>
          </a>

          <!-- 2 · Scroll Domains -->
          <a href="https://domainlist.fabianternis.de"
             class="btn btn--domains"
             id="btn-domains"
             target="_blank"
             rel="noopener noreferrer"
             aria-label="Browse my domain list (opens in new tab)">
            <span class="btn__inner">
              <span class="btn__icon" aria-hidden="true">
                <svg width="15" height="15" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor"
                     stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                     aria-hidden="true" focusable="false">
                  <circle cx="12" cy="12" r="10"/>
                  <path d="M2 12h20"/>
                  <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
              </span>
              <span class="btn__text">Scroll Domains</span>
            </span>
          </a>

          <!-- 3 · Hire Me -->
          <a href="https://pleasehireme.eu"
             class="btn btn--hire"
             id="btn-hire"
             target="_blank"
             rel="noopener noreferrer"
             aria-label="Hire Fabian Ternis (opens in new tab)">
            <span class="btn__watermark" aria-hidden="true">✓</span>
            <span class="btn__inner">
              <span class="btn__text">Hire Me</span>
              <span class="btn__icon" aria-hidden="true">
                <svg width="15" height="15" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor"
                     stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                     aria-hidden="true" focusable="false">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
              </span>
            </span>
          </a>

        </div><!-- /btn-row-1 -->

        <!-- Row 2 — WIP (disabled, hover-only showcase) -->
        <div class="btn-row btn-row--wip" id="btn-row-2">

          <!-- 4 · WIP — 3D tilt + shine -->
          <button class="btn btn--wip btn--tilt"
                  id="btn-wip-tilt"
                  aria-label="Work in progress — not yet available">
            <span class="btn__shine" aria-hidden="true"></span>
            <span class="btn__inner">
              <span class="btn__icon" aria-hidden="true">
                <svg width="15" height="15" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor"
                     stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                     aria-hidden="true" focusable="false">
                  <circle cx="12" cy="12" r="10"/>
                  <line x1="12" y1="8" x2="12" y2="12"/>
                  <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
              </span>
              <span class="btn__text">Work in Progress</span>
            </span>
          </button>

          <!-- 5 · WIP — slice reveal -->
          <button class="btn btn--wip btn--slice"
                  id="btn-wip-slice"
                  aria-label="Work in progress — not yet available">
            <span class="btn__slices" aria-hidden="true">
              <span class="btn__slice btn__slice--1"></span>
              <span class="btn__slice btn__slice--2"></span>
              <span class="btn__slice btn__slice--3"></span>
            </span>
            <span class="btn__inner">
              <span class="btn__text">Work in Progress</span>
              <span class="btn__icon" aria-hidden="true">
                <svg width="15" height="15" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor"
                     stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                     aria-hidden="true" focusable="false">
                  <circle cx="12" cy="12" r="10"/>
                  <polyline points="12 6 12 12 16 14"/>
                </svg>
              </span>
            </span>
            <span class="btn__reveal" aria-hidden="true">
              Coming Soon
              <svg width="15" height="15" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor"
                   stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                   aria-hidden="true" focusable="false">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
              </svg>
            </span>
          </button>

        </div><!-- /btn-row-2 -->

      </nav>
    </div><!-- /stage -->

    <p class="site-footer-note" aria-hidden="true">
      ww1.fabianternis.de&nbsp;/&nbsp;ww1.fabianternis.dev
    </p>

  </main><!-- /main -->

  <!-- Cursor dot -->
  <div class="cursor-dot" id="cursor-dot" aria-hidden="true"></div>

  <script src="script.js"></script>
</body>
</html>
