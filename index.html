<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabian Ternis - German Webdeveloper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Loader -->
    <div class="loader" id="loader">
        <div class="loader-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
            <div class="shape shape-4"></div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <!-- Floating decorative elements -->
        <div class="floating-elements" aria-hidden="true">
            <div class="float-circle float-1"></div>
            <div class="float-circle float-2"></div>
            <div class="float-circle float-3"></div>
        </div>

        <!-- Hero Section -->
        <section class="hero">
            <div class="hero-content">
                <header class="hero-header">
                    <h1 class="hero-name" id="heroName">
                        <span class="name-letter" style="--char-index: 0">F</span><span class="name-letter" style="--char-index: 1">a</span><span class="name-letter" style="--char-index: 2">b</span><span class="name-letter" style="--char-index: 3">i</span><span class="name-letter" style="--char-index: 4">a</span><span class="name-letter" style="--char-index: 5">n</span>
                        <span class="name-space"></span>
                        <span class="name-letter" style="--char-index: 6">T</span><span class="name-letter" style="--char-index: 7">e</span><span class="name-letter" style="--char-index: 8">r</span><span class="name-letter" style="--char-index: 9">n</span><span class="name-letter" style="--char-index: 10">i</span><span class="name-letter" style="--char-index: 11">s</span>
                    </h1>
                    <p class="hero-subtitle" id="heroSubtitle">
                        <span class="subtitle-word">German</span>
                        <span class="subtitle-word">Webdeveloper</span>
                    </p>
                </header>

                <nav class="cta-container" aria-label="Main navigation">
                    <!-- Button 1: View Work - Border Draw Animation -->
                    <a href="https://work.fabianternis.dev" class="cta-btn cta-btn--draw" id="btnWork">
                        <span class="btn-text">
                            <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                            </svg>
                            View Work
                        </span>
                        <svg class="btn-border" viewBox="0 0 100 100" preserveAspectRatio="none">
                            <rect class="border-rect" x="0" y="0" width="100" height="100" rx="0" fill="none"/>
                        </svg>
                        <span class="btn-fill"></span>
                    </a>

                    <!-- Button 2: Scroll Domains - 3D Tilt Animation -->
                    <a href="https://domainlist.fabianternis.de" class="cta-btn cta-btn--tilt" id="btnDomains">
                        <span class="btn-text">
                            <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"/>
                                <line x1="2" y1="12" x2="22" y2="12"/>
                                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                            </svg>
                            Scroll Domains
                        </span>
                        <span class="tilt-shine"></span>
                    </a>

                    <!-- Button 3: Hire Me - Slice Reveal Animation -->
                    <a href="https://pleasehireme.eu" class="cta-btn cta-btn--slice" id="btnHire">
                        <span class="btn-text">
                            <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                            Hire Me
                        </span>
                        <span class="slice-wrapper">
                            <span class="slice slice-1"></span>
                            <span class="slice slice-2"></span>
                            <span class="slice slice-3"></span>
                        </span>
                        <span class="btn-text-reveal">Hire Me</span>
                    </a>
                </nav>

                <!-- Footer -->
                <footer class="hero-footer">
                    <span class="footer-line"></span>
                    <span class="footer-text">Based in Germany</span>
                </footer>
            </div>
        </section>

        <!-- Cursor follower -->
        <div class="cursor-follower" id="cursorFollower" aria-hidden="true"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
