<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Fabian Ternis — German Webdeveloper. Portfolio, domain projects, and hire inquiries.">
  <title>Fabian Ternis — German Webdeveloper</title>

  <!-- Fonts: Syne (display) + Space Mono (labels) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══════════════════════════════════════
       SKIP LINK (accessibility)
  ═══════════════════════════════════════ -->
  <a class="skip-link" href="#main-content">Skip to content</a>

  <!-- ═══════════════════════════════════════
       LOADER — curtain split reveal
  ═══════════════════════════════════════ -->
  <div id="loader" class="loader" aria-hidden="true">
    <div class="loader__half loader__half--top">
      <div class="loader__brand">FT</div>
    </div>
    <div class="loader__half loader__half--bot"></div>
    <div class="loader__seam"></div>
  </div>

  <!-- ═══════════════════════════════════════
       CUSTOM CURSOR
  ═══════════════════════════════════════ -->
  <div class="cursor-dot"  id="cursorDot"  aria-hidden="true"></div>
  <div class="cursor-ring" id="cursorRing" aria-hidden="true"></div>

  <!-- ═══════════════════════════════════════
       PAGE WRAPPER  (gets .is-revealed)
  ═══════════════════════════════════════ -->
  <div class="page" id="page">

    <!-- NAV ─────────────────────────────── -->
    <nav class="nav" aria-label="Site navigation">
      <a href="/" class="nav__logo" aria-label="Fabian Ternis — home">FT</a>
      <div class="nav__right">
        <span class="nav__domain">web.fabianternis.de</span>
        <span class="nav__sep" aria-hidden="true">—</span>
        <span class="nav__year">2026</span>
      </div>
    </nav>

    <!-- HERO ────────────────────────────── -->
    <main class="hero" id="main-content">

      <!-- Decorative large number -->
      <div class="hero__bg-num" aria-hidden="true">01</div>

      <!-- Decorative rotating square -->
      <div class="hero__deco" aria-hidden="true">
        <div class="deco__sq"></div>
      </div>

      <div class="hero__content">

        <!-- ── Label ── -->
        <div class="hero__label" aria-hidden="true">
          <span class="hero__label-line"></span>
          <span class="hero__label-text">Portfolio</span>
        </div>

        <!-- ── Name ── -->
        <h1 class="hero__name" aria-label="Fabian Ternis">
          <span class="name-row" aria-hidden="true">
            <span class="name-clip">
              <span class="ch" style="--i:0">F</span><!--
              --><span class="ch" style="--i:1">A</span><!--
              --><span class="ch" style="--i:2">B</span><!--
              --><span class="ch" style="--i:3">I</span><!--
              --><span class="ch" style="--i:4">A</span><!--
              --><span class="ch" style="--i:5">N</span>
            </span>
          </span>
          <span class="name-row" aria-hidden="true">
            <span class="name-clip">
              <span class="ch" style="--i:6">T</span><!--
              --><span class="ch" style="--i:7">E</span><!--
              --><span class="ch" style="--i:8">R</span><!--
              --><span class="ch" style="--i:9">N</span><!--
              --><span class="ch" style="--i:10">I</span><!--
              --><span class="ch" style="--i:11">S</span>
            </span>
          </span>
        </h1>

        <!-- ── Subtitle ── -->
        <p class="hero__sub">
          <span class="sub-inner">German Webdeveloper</span>
        </p>

        <!-- ── CTA Buttons ── -->
        <nav class="hero__btns" aria-label="Quick links">

          <!-- BTN 1 ▸ VIEW WORK — Liquid fill + magnetic pull + arrow launch -->
          <a
            href="https://work.fabianternis.dev"
            class="btn btn--work"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="View Fabian's work (opens new tab)"
          >
            <span class="btn__fill" aria-hidden="true"></span>
            <span class="btn__label">View Work</span>
            <!-- lucide: arrow-right (embedded) -->
            <svg class="btn__icon btn__icon--arrow" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <line x1="5" y1="12" x2="19" y2="12"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <polyline points="12 5 19 12 12 19"
                        stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
          </a>

          <!-- BTN 2 ▸ SCROLL DOMAINS — Targeting reticle + text scramble -->
          <a
            href="https://domainlist.fabianternis.de"
            class="btn btn--domains"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Browse domain list (opens new tab)"
          >
            <!-- Reticle corners -->
            <span class="rc rc--tl" aria-hidden="true"></span>
            <span class="rc rc--tr" aria-hidden="true"></span>
            <span class="rc rc--bl" aria-hidden="true"></span>
            <span class="rc rc--br" aria-hidden="true"></span>
            <span class="btn__label" data-scramble>Scroll Domains</span>
            <!-- lucide: grid-2x2 (embedded) -->
            <svg class="btn__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <rect x="3" y="3" width="8" height="8" rx="1"
                    stroke="currentColor" stroke-width="2"/>
              <rect x="13" y="3" width="8" height="8" rx="1"
                    stroke="currentColor" stroke-width="2"/>
              <rect x="3" y="13" width="8" height="8" rx="1"
                    stroke="currentColor" stroke-width="2"/>
              <rect x="13" y="13" width="8" height="8" rx="1"
                    stroke="currentColor" stroke-width="2"/>
            </svg>
          </a>

          <!-- BTN 3 ▸ HIRE ME — Elastic bounce + radiating sparks -->
          <a
            href="https://pleasehireme.eu"
            class="btn btn--hire"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Hire Fabian (opens new tab)"
          >
            <span class="btn__label">Hire Me</span>
            <!-- lucide: zap (embedded) -->
            <svg class="btn__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"
                       stroke="currentColor" stroke-width="2"
                       stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>

        </nav>
      </div><!-- /.hero__content -->
    </main>

    <!-- MARQUEE ──────────────────────────── -->
    <div class="marquee" aria-hidden="true">
      <div class="marquee__track">
        <span class="mq-item">FABIAN TERNIS</span>
        <span class="mq-dot">✦</span>
        <span class="mq-item">GERMAN WEBDEVELOPER</span>
        <span class="mq-dot">✦</span>
        <span class="mq-item">AVAILABLE FOR WORK</span>
        <span class="mq-dot">✦</span>
        <span class="mq-item">FABIAN TERNIS</span>
        <span class="mq-dot">✦</span>
        <span class="mq-item">GERMAN WEBDEVELOPER</span>
        <span class="mq-dot">✦</span>
        <span class="mq-item">AVAILABLE FOR WORK</span>
        <span class="mq-dot">✦</span>
      </div>
    </div>

    <!-- FOOTER ──────────────────────────── -->
    <footer class="footer">
      <span class="footer__copy">© 2025 Fabian Ternis</span>
      <span class="footer__loc">Based in Germany</span>
    </footer>

  </div><!-- /#page -->

  <script src="script.js"></script>
</body>
</html>
