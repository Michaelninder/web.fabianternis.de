<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Fabian Ternis — German Webdeveloper. Portfolio & Contact.">
    <title>Fabian Ternis — German Webdeveloper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ═══════════════════════════════════════
         INTRO CURTAIN
    ═══════════════════════════════════════ -->
    <div class="curtain" id="curtain" aria-hidden="true">
        <div class="curtain__panel curtain__panel--a"></div>
        <div class="curtain__panel curtain__panel--b"></div>
        <div class="curtain__counter" id="curtainCounter">00</div>
    </div>

    <!-- ═══════════════════════════════════════
         GRAIN OVERLAY
    ═══════════════════════════════════════ -->
    <div class="grain" aria-hidden="true"></div>

    <!-- ═══════════════════════════════════════
         AMBIENT GLOW
    ═══════════════════════════════════════ -->
    <div class="ambient" aria-hidden="true"></div>

    <!-- ═══════════════════════════════════════
         BACKGROUND GRID LINES
    ═══════════════════════════════════════ -->
    <div class="gridlines" aria-hidden="true" id="gridlines">
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <!-- ═══════════════════════════════════════
         MAIN PAGE
    ═══════════════════════════════════════ -->
    <main class="page">

        <!-- Top eyebrow bar -->
        <div class="eyebrow" id="eyebrow" aria-hidden="true">
            <span class="eyebrow__tag">Portfolio</span>
            <span class="eyebrow__divider"></span>
            <span class="eyebrow__tag">2026</span>
            <span class="eyebrow__spacer"></span>
            <span class="eyebrow__tag eyebrow__tag--right">web.fabianternis.de</span>
        </div>

        <!-- ─── HERO ─── -->
        <section class="hero" id="hero">

            <h1 class="name" id="heroName" aria-label="Fabian Ternis">
                <span class="name__row name__row--a" aria-hidden="true">
                    <span class="nc" style="--i:0">F</span><span
                        class="nc" style="--i:1">a</span><span
                        class="nc" style="--i:2">b</span><span
                        class="nc" style="--i:3">i</span><span
                        class="nc" style="--i:4">a</span><span
                        class="nc" style="--i:5">n</span>
                </span>
                <span class="name__row name__row--b" aria-hidden="true">
                    <span class="nc" style="--i:6">T</span><span
                        class="nc" style="--i:7">e</span><span
                        class="nc" style="--i:8">r</span><span
                        class="nc" style="--i:9">n</span><span
                        class="nc" style="--i:10">i</span><span
                        class="nc" style="--i:11">s</span>
                </span>
            </h1>

            <div class="subtitle" id="heroSubtitle">
                <span class="subtitle__mark" aria-hidden="true">—</span>
                <span class="subtitle__text">German Webdeveloper</span>
            </div>

        </section>

        <!-- ─── BUTTONS ─── -->
        <nav class="cta" id="ctaNav" aria-label="Main navigation">

            <!-- BUTTON 1: VIEW WORK — Liquid gold fill sweep -->
            <a href="https://work.fabianternis.dev"
               class="btn btn--work"
               target="_blank"
               rel="noopener noreferrer"
               aria-label="View Work — opens in new tab">
                <span class="btn__bg" aria-hidden="true"></span>
                <span class="btn__text">View Work</span>
                <span class="btn__icon" aria-hidden="true">
                    <!-- Arrow right (heroicons style, inline) -->
                    <svg width="16" height="16" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor"
                         stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14"/>
                        <path d="M12 5l7 7-7 7"/>
                    </svg>
                </span>
            </a>

            <!-- BUTTON 2: SCROLL DOMAINS — Traced border + text scramble -->
            <a href="https://domainlist.fabianternis.de"
               class="btn btn--domains"
               target="_blank"
               rel="noopener noreferrer"
               aria-label="Scroll Domains — opens in new tab"
               data-original="Scroll Domains">
                <!-- Animated SVG border (sized via JS) -->
                <svg class="btn__trace" aria-hidden="true">
                    <rect class="trace__rect" x="0.5" y="0.5" rx="1.5" ry="1.5"/>
                </svg>
                <span class="btn__icon" aria-hidden="true">
                    <!-- Globe icon -->
                    <svg width="15" height="15" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor"
                         stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                        <line x1="2" y1="12" x2="22" y2="12"/>
                    </svg>
                </span>
                <span class="btn__text" id="domainsText">Scroll Domains</span>
            </a>

            <!-- BUTTON 3: HIRE ME — Pulse rings + availability dot -->
            <a href="https://pleasehireme.eu"
               class="btn btn--hire"
               target="_blank"
               rel="noopener noreferrer"
               aria-label="Hire Me — opens in new tab">
                <!-- Expanding rings (animated on hover) -->
                <span class="hire__rings" aria-hidden="true">
                    <span class="hire__ring" style="--d:0s"></span>
                    <span class="hire__ring" style="--d:.25s"></span>
                    <span class="hire__ring" style="--d:.5s"></span>
                </span>
                <span class="hire__dot" aria-hidden="true"></span>
                <span class="btn__text">Hire Me</span>
                <!-- Starburst icon -->
                <span class="btn__icon hire__star" aria-hidden="true">
                    <svg width="14" height="14" viewBox="0 0 24 24"
                         fill="currentColor" stroke="none">
                        <path d="M12 2l1.5 7.5L21 12l-7.5 1.5L12 21l-1.5-7.5L3 12l7.5-1.5z"/>
                    </svg>
                </span>
            </a>

        </nav>

        <!-- Footer domain label -->
        <footer class="page-footer" id="pageFooter">
            <span class="page-footer__url">web.fabianternis.de</span>
            <span class="page-footer__sep"> · </span>
            <span class="page-footer__url">web.fabianternis.dev</span>
        </footer>

    </main>

    <script src="script.js"></script>
</body>
</html>
