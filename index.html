<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabian Ternis | German Web Developer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background">
        <div class="grid-overlay"></div>
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <main class="container">
        <header class="hero">
            <div class="hero-content">
                <div class="label">
                    <span class="label-dot"></span>
                    <span class="label-text">Portfolio 2026</span>
                </div>
                
                <h1 class="headline">
                    <span class="headline-line headline-line-1">
                        <span class="word" data-word="Fabian">Fabian</span>
                    </span>
                    <span class="headline-line headline-line-2">
                        <span class="word" data-word="Ternis">Ternis</span>
                    </span>
                </h1>

                <p class="subheadline">
                    <span class="sub-line">German Webdeveloper</span>
                </p>

                <div class="cta-group">
                    <a href="https://work.fabianternis.dev" class="btn btn-primary" target="_blank" rel="noopener">
                        <span class="btn-text">View Work</span>
                        <span class="btn-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M5 12h14"/>
                                <path d="m12 5 7 7-7 7"/>
                            </svg>
                        </span>
                        <span class="btn-glow"></span>
                    </a>

                    <a href="https://domainlist.fabianternis.de" class="btn btn-secondary" target="_blank" rel="noopener">
                        <span class="btn-icon-left">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
                                <path d="M2 12h20"/>
                            </svg>
                        </span>
                        <span class="btn-text">Scroll Domains</span>
                    </a>

                    <a href="https://pleasehireme.eu" class="btn btn-tertiary" target="_blank" rel="noopener">
                        <span class="btn-icon-left">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
                            </svg>
                        </span>
                        <span class="btn-text">Hire Me</span>
                    </a>
                </div>
            </div>

            <div class="decoration">
                <div class="decoration-ring"></div>
                <div class="decoration-dot"></div>
            </div>
        </header>

        <footer class="footer">
            <div class="footer-content">
                <span class="footer-domain">web.fabianternis.de</span>
                <span class="footer-separator">|</span>
                <span class="footer-location">Based in Germany</span>
            </div>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
