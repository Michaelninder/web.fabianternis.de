<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Fabian Ternis – German Web Developer. View work, browse domains, or get in touch." />
  <title>Fabian Ternis — Web Developer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Loader -->
  <div class="loader" id="loader" aria-hidden="true">
    <div class="loader__line"></div>
  </div>

  <!-- Noise overlay -->
  <div class="noise" aria-hidden="true"></div>

  <!-- Grid lines decoration -->
  <div class="grid-lines" aria-hidden="true">
    <span></span><span></span><span></span><span></span>
  </div>

  <!-- Main content -->
  <main class="main" id="main">

    <!-- Top label -->
    <div class="label label--top">
      <span class="label__dot"></span>
      <span class="label__text" data-reveal>Portfolio — 2026</span>
    </div>

    <!-- Hero section -->
    <section class="hero" aria-labelledby="hero-name">

      <div class="hero__name-wrap">
        <h1 class="hero__name" id="hero-name">
          <span class="hero__name-line" data-reveal data-delay="0">Fabian</span>
          <span class="hero__name-line hero__name-line--accent" data-reveal data-delay="1">Ternis</span>
        </h1>
        <div class="hero__rule" data-reveal data-delay="2" aria-hidden="true"></div>
        <p class="hero__subtitle" data-reveal data-delay="3">
          <span class="hero__subtitle-text">German&nbsp;Webdeveloper</span>
        </p>
      </div>

    </section>

    <!-- CTA section -->
    <nav class="cta-nav" aria-label="Quick actions" data-reveal data-delay="4">

      <!-- Button 1: View Work -->
      <a
        href="https://work.fabianternis.dev"
        class="cta cta--work"
        aria-label="View my work"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="cta__bg-sweep" aria-hidden="true"></span>
        <span class="cta__corner cta__corner--tl" aria-hidden="true"></span>
        <span class="cta__corner cta__corner--br" aria-hidden="true"></span>
        <span class="cta__inner">
          <!-- Lucide: Layers icon -->
          <svg class="cta__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polygon points="12 2 2 7 12 12 22 7 12 2"/>
            <polyline points="2 17 12 22 22 17"/>
            <polyline points="2 12 12 17 22 12"/>
          </svg>
          <span class="cta__label">View Work</span>
        </span>
        <span class="cta__scan" aria-hidden="true"></span>
      </a>

      <!-- Button 2: Scroll Domains -->
      <a
        href="https://domainlist.fabianternis.de"
        class="cta cta--domains"
        aria-label="Scroll domains list"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="cta__shutter cta__shutter--top" aria-hidden="true"></span>
        <span class="cta__shutter cta__shutter--bot" aria-hidden="true"></span>
        <span class="cta__inner">
          <!-- Lucide: Globe icon -->
          <svg class="cta__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          <span class="cta__label">Scroll Domains</span>
        </span>
      </a>

      <!-- Button 3: Hire Me -->
      <a
        href="https://pleasehireme.eu"
        class="cta cta--hire"
        aria-label="Hire Fabian Ternis"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="cta__pulse" aria-hidden="true"></span>
        <span class="cta__inner">
          <!-- Lucide: UserCheck icon -->
          <svg class="cta__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <polyline points="16 11 18 13 22 9"/>
          </svg>
          <span class="cta__label">Hire Me</span>
        </span>
      </a>

    </nav>

    <!-- Bottom label -->
    <div class="label label--bottom" data-reveal data-delay="5">
      <span class="label__text">web.fabianternis.de</span>
      <span class="label__dot"></span>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
